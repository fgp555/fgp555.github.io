<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Password Manager</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" />

    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: Arial;
        background: #0f172a;
        color: #fff;
        margin: 0;
      }

      .container {
        max-width: 50rem;
        margin: 0 auto;
        padding: 20px;
      }

      input,
      button {
        padding: 10px;
        margin: 5px;
        border-radius: 8px;
        border: none;
      }

      input {
        width: 100%;
      }

      button {
        cursor: pointer;
      }

      .card {
        background: #1e293b;
        padding: 15px;
        border-radius: 12px;
        width: 100%;
        /* display: flex; */
        flex-direction: column;
        justify-content: space-between;
        p,
        h3 {
          margin: 0;
          padding: 0;
        }
        p {
          font-size: 0.8rem;
        }
      }

      /* Ver */
      .actions button:nth-child(1):hover {
        background: #0ea5e9;
      }

      /* Copiar pass */
      .actions button:nth-child(2):hover {
        background: #22c55e;
      }

      /* Copiar URL */
      .actions button:nth-child(3):hover {
        background: #38bdf8;
      }

      /* Editar */
      .actions button:nth-child(4):hover {
        background: #eab308;
      }

      /* Eliminar */
      .actions button:nth-child(5):hover {
        background: #ef4444;
      }

      .flex {
        display: flex;
        gap: 10px;
      }

      .topbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .actions {
        button {
          font-size: 0.7rem;
          padding: 0.5rem;
          opacity: 0.8;
        }
        button:hover {
          opacity: 1;
        }
      }

      /* 🔐 Password input */
      .input-group {
        position: relative;
      }

      .input-group input {
        width: 100%;
        padding-right: 40px;
      }

      .input-group i {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #94a3b8;
        transition: 0.2s;
      }

      .input-group i:hover {
        color: #fff;
      }

      /* 📊 GRID 2 COLUMNAS A LA DERECHA */
      #list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 15px;
      }

      .url {
        display: inline-block;
        max-width: 40ch;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        vertical-align: bottom;
        color: #38bdf8;
      }

      /* 📱 Responsive */
      @media (max-width: 600px) {
        #list {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>🔐 Password Manager</h2>
      <input id="search" placeholder="Buscar..." />
      <br />
      <br />

      <div id="list"></div>

      <br />
      <br />

      <hr />

      <h3>➕ Nuevo / Editar</h3>

      <input id="title" placeholder="Título" />

      <div class="input-group">
        <input id="password" type="password" placeholder="Password" />
        <i class="fa fa-eye" id="togglePass" onclick="toggleInputPassword()"></i>
      </div>

      <input id="url" placeholder="URL" />

      <div class="flex">
        <button onclick="generatePassword()">Generar</button>
        <button onclick="save()">Guardar</button>
      </div>

      <hr />
      <br />
      <br />
      <br />

      <div class="topbar">
        <button onclick="exportData()">Exportar JSON</button>
        <input type="file" onchange="importData(event)" />
      </div>
      <br />
      <br />
      <br />
    </div>

    <script>
      let data = JSON.parse(localStorage.getItem("passwords") || "[]");
      let editIndex = null;

      function encrypt(text) {
        return btoa(text);
      }

      function decrypt(text) {
        try {
          return atob(text);
        } catch {
          return "";
        }
      }

      function save() {
        const title = document.getElementById("title").value;
        const password = document.getElementById("password").value;
        const url = document.getElementById("url").value;

        if (!title || !password) return alert("Faltan datos");

        const item = {
          title,
          password: encrypt(password),
          url,
          date: new Date().toLocaleString(),
        };

        if (editIndex !== null) {
          data[editIndex] = item;
          editIndex = null;
        } else {
          data.push(item);
        }

        localStorage.setItem("passwords", JSON.stringify(data));
        clearForm();
        render();
      }

      function clearForm() {
        title.value = "";
        password.value = "";
        url.value = "";

        document.getElementById("password").type = "password";
        document.getElementById("togglePass").classList.remove("fa-eye-slash");
        document.getElementById("togglePass").classList.add("fa-eye");
      }

      function render() {
        const search = document.getElementById("search").value.toLowerCase();
        const list = document.getElementById("list");
        list.innerHTML = "";

        data
          .filter((i) => i.title.toLowerCase().includes(search))
          .forEach((item, index) => {
            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
        <h3>${item.title}</h3>
        <p><b>Password:</b> <span id="pass-${index}">******</span></p>
<p>
  <b>URL:</b>
  <a href="${item.url}" target="_blank" class="url" title="${item.url}">
    ${item.url}
  </a>
</p>        <p><small>${item.date}</small></p>

        <div class="actions">
          <button onclick="toggle(${index})"><i class="fa fa-eye"></i></button>
          <button onclick="copyPass(${index})"><i class="fa fa-copy"></i> Pass</button>
          <button onclick="copyUrl(${index})"><i class="fa fa-link"></i></button>
          <button onclick="edit(${index})"><i class="fa fa-edit"></i></button>
          <button onclick="removeItem(${index})"><i class="fa fa-trash"></i></button>
        </div>
      `;

            list.appendChild(div);
          });
      }

      function toggle(index) {
        const el = document.getElementById("pass-" + index);
        if (el.innerText === "******") {
          el.innerText = decrypt(data[index].password);
        } else {
          el.innerText = "******";
        }
      }

      function copyPass(index) {
        navigator.clipboard.writeText(decrypt(data[index].password));
        // alert("Password copiado");
      }

      function copyUrl(index) {
        navigator.clipboard.writeText(data[index].url);
        // alert("URL copiado");
      }

      function edit(index) {
        const item = data[index];
        title.value = item.title;
        password.value = decrypt(item.password);
        url.value = item.url;
        editIndex = index;

        document.getElementById("password").type = "password";
        document.getElementById("togglePass").classList.remove("fa-eye-slash");
        document.getElementById("togglePass").classList.add("fa-eye");
      }

      function removeItem(index) {
        if (!confirm("¿Eliminar?")) return;
        data.splice(index, 1);
        localStorage.setItem("passwords", JSON.stringify(data));
        render();
      }

      function generatePassword() {
        const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%";
        let pass = "";
        for (let i = 0; i < 12; i++) {
          pass += chars[Math.floor(Math.random() * chars.length)];
        }
        document.getElementById("password").value = pass;
      }

      function exportData() {
        const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "passwords.json";
        a.click();
      }

      function importData(e) {
        const file = e.target.files[0];
        const reader = new FileReader();

        reader.onload = function () {
          if (!confirm("Esto reemplazará todo. ¿Continuar?")) return;
          data = JSON.parse(reader.result);
          localStorage.setItem("passwords", JSON.stringify(data));
          render();
        };

        reader.readAsText(file);
      }

      function toggleInputPassword() {
        const input = document.getElementById("password");
        const icon = document.getElementById("togglePass");

        if (input.type === "password") {
          input.type = "text";
          icon.classList.remove("fa-eye");
          icon.classList.add("fa-eye-slash");
        } else {
          input.type = "password";
          icon.classList.remove("fa-eye-slash");
          icon.classList.add("fa-eye");
        }
      }

      document.getElementById("search").addEventListener("input", render);

      render();
    </script>
  </body>
</html>

<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Password Manager</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css?2026_03_005" />
  </head>

  <body>
    <div class="container">
      <h2>🔐 Password Manager</h2>
      <input id="search" placeholder="Buscar..." />

      <div id="list"></div>

      <hr />

      <h3>➕ Nuevo / Editar</h3>

      <input id="title" placeholder="Título" />
      <input id="username" placeholder="Usuario / Email / ID" />

      <div class="input-group">
        <input id="password" type="password" placeholder="Password" />
        <i class="fa fa-eye" id="togglePass" onclick="toggleInputPassword()"></i>
      </div>

      <input id="url" placeholder="URL" />

      <div class="flex">
        <button onclick="generatePassword()">Generar</button>
        <button onclick="save()">Guardar</button>
      </div>

      <hr />

      <div class="topbar">
        <button onclick="exportData()">Exportar CSV</button>

        <label class="file-label">
          Import CSV
          <input type="file" accept=".csv" onchange="importData(event)" hidden />
        </label>
        <button onclick="clearAll()">Borrar todo</button>
      </div>
    </div>

    <footer class="footer">
      <style>
        .footer {
          text-align: center;
          padding: 20px;
          color: #94a3b8;
          font-size: 0.8rem;
        }

        .footer a {
          color: #38bdf8;
          text-decoration: none;
          transition: 0.2s;
        }

        .footer a:hover {
          color: #0ea5e9;
        }

        .footer a:active {
          color: #0284c7;
        }
      </style>
      <p>
        © 2026
        <a href="http://frankgp.com/" target="_blank">frankgp.com</a>
      </p>
    </footer>
    <section>
      <style>
        #toast {
          position: fixed;
          bottom: 20px;
          right: 20px;
          background: #1e293b;
          color: #fff;
          padding: 12px 16px;
          border-radius: 10px;
          font-size: 0.85rem;
          opacity: 0;
          transform: translateY(20px);
          pointer-events: none;
          transition: all 0.3s ease;
          box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
          z-index: 9999;
        }

        #toast.show {
          opacity: 1;
          transform: translateY(0);
        }
      </style>
      <div id="toast"></div>
    </section>

    <script src="script.js?2026_03_005"></script>
  </body>
</html>

<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Password Manager</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" />

    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: Arial;
        background: #0f172a;
        color: #fff;
        margin: 0;
      }

      .container {
        max-width: 50rem;
        margin: 0 auto;
        padding: 20px;
      }

      input,
      button {
        padding: 10px;
        margin: 5px;
        border-radius: 8px;
        border: none;
      }

      input {
        width: 100%;
      }
      #search {
        margin: 1rem 0;
      }

      button {
        cursor: pointer;
      }

      .card {
        position: relative;
        background: #1e293b;
        padding: 15px;
        border-radius: 12px;
        width: 100%;
        /* display: flex; */
        flex-direction: column;
        justify-content: space-between;
        p,
        h3 {
          margin: 0;
          padding: 0;
        }
        p {
          font-size: 0.8rem;
        }
      }
      /* Ver */
      .btn-view:hover {
        background: #0ea5e9;
      }
      .btn-view:active {
        background: #0369a1;
      }

      /* User */
      .btn-user:hover {
        background: #a78bfa;
      }
      .btn-user:active {
        background: #6d28d9;
      }

      /* Password */
      .btn-pass:hover {
        background: #22c55e;
      }
      .btn-pass:active {
        background: #15803d;
      }

      /* URL */
      .btn-url:hover {
        background: #38bdf8;
      }
      .btn-url:active {
        background: #0284c7;
      }

      /* Editar */
      .btn-edit:hover {
        background: #eab308;
      }
      .btn-edit:active {
        background: #a16207;
      }

      /* Eliminar */
      .btn-delete:hover {
        background: #ef4444;
      }
      .btn-delete:active {
        background: #991b1b;
      }

      .actions button {
        background: transparent;
        border: none;
        color: #94a3b8;
        padding: 6px;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.2s;
      }

      .actions button:hover {
        background: #334155;
        color: #fff;
      }

      .actions button:active {
        transform: scale(0.9);
      }

      .btn-edit:hover {
        color: #eab308;
      }
      .btn-delete:hover {
        color: #ef4444;
      }

      .actions {
        opacity: 0;
      }

      .card:hover .actions {
        opacity: 1;
      }

      .flex {
        display: flex;
        gap: 10px;
      }

      .topbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        flex-direction: row;
        align-items: center;
      }

      .actions {
        position: absolute;
        top: 1rem;
        right: 1rem;
        display: flex;
        gap: 5px;
        button {
          font-size: 0.7rem;
          padding: 0.5rem;
          opacity: 0.8;
        }
        button:hover {
          opacity: 1;
        }
      }

      /* 🔐 Password input */
      .input-group {
        position: relative;
      }

      .input-group input {
        width: 100%;
        padding-right: 40px;
      }

      .input-group i {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #94a3b8;
        transition: 0.2s;
      }

      .input-group i:hover {
        color: #fff;
      }

      /* 📊 GRID 2 COLUMNAS A LA DERECHA */
      #list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 15px;
      }

      .url {
        display: inline-block;
        max-width: 40ch;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        vertical-align: bottom;
        color: #38bdf8;
      }

      input[type="file"] {
        color: #94a3b8;
        font-size: 0.9rem;
        width: initial;
      }

      input[type="file"]::file-selector-button {
        background: #1e293b;
        color: #fff;
        border: none;
        padding: 8px 12px;
        border-radius: 8px;
        cursor: pointer;
        margin-right: 10px;
        transition: 0.2s;
      }

      input[type="file"]::file-selector-button:hover {
        background: #38bdf8;
      }

      input[type="file"]::file-selector-button:active {
        background: #0284c7;
        transform: scale(0.97);
      }

      .row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .icon-btn {
        background: transparent;
        border: none;
        color: #94a3b8;
        cursor: pointer;
        padding: 4px;
        border-radius: 6px;
        transition: 0.2s;
      }

      .icon-btn:hover {
        background: #334155;
        color: #fff;
      }

      .icon-btn:active {
        transform: scale(0.9);
      }

      /* Colores específicos */
      .btn-user:hover {
        color: #a78bfa;
      }
      .btn-pass:hover {
        color: #22c55e;
      }
      .btn-view:hover {
        color: #38bdf8;
      }
      .btn-url:hover {
        color: #0ea5e9;
      }

      .date {
        text-align: right;
        font-size: 0.75rem;
        color: #94a3b8;
        margin-top: 8px;
      }

      .click-copy {
        cursor: pointer;
        transition: 0.2s;
      }

      .click-copy:hover {
        color: #38bdf8;
      }

      /* 📱 Responsive */
      @media (max-width: 600px) {
        #list {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>🔐 Password Manager</h2>
      <input id="search" placeholder="Buscar..." />

      <div id="list"></div>

      <hr />

      <h3>➕ Nuevo / Editar</h3>

      <input id="title" placeholder="Título" />
      <input id="username" placeholder="Usuario / Email / ID" />

      <div class="input-group">
        <input id="password" type="password" placeholder="Password" />
        <i class="fa fa-eye" id="togglePass" onclick="toggleInputPassword()"></i>
      </div>

      <input id="url" placeholder="URL" />

      <div class="flex">
        <button onclick="generatePassword()">Generar</button>
        <button onclick="save()">Guardar</button>
      </div>

      <hr />

      <div class="topbar">
        <button onclick="exportData()">Exportar JSON</button>
        <input type="file" onchange="importData(event)" />
      </div>
    </div>

    <footer class="footer">
      <style>
        .footer {
          text-align: center;
          padding: 20px;
          color: #94a3b8;
          font-size: 0.8rem;
        }

        .footer a {
          color: #38bdf8;
          text-decoration: none;
          transition: 0.2s;
        }

        .footer a:hover {
          color: #0ea5e9;
        }

        .footer a:active {
          color: #0284c7;
        }
      </style>
      <p>
        © 2026
        <a href="http://frankgp.com/" target="_blank">frankgp.com</a>
      </p>
    </footer>
    <section>
      <style>
        #toast {
          position: fixed;
          bottom: 20px;
          right: 20px;
          background: #1e293b;
          color: #fff;
          padding: 12px 16px;
          border-radius: 10px;
          font-size: 0.85rem;
          opacity: 0;
          transform: translateY(20px);
          pointer-events: none;
          transition: all 0.3s ease;
          box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
          z-index: 9999;
        }

        #toast.show {
          opacity: 1;
          transform: translateY(0);
        }
      </style>
      <div id="toast"></div>
    </section>
    <script>
      let data = JSON.parse(localStorage.getItem("passwords") || "[]");
      let editIndex = null;
      let dragStartIndex = null;

      let toastTimeout;

      function showToast(message) {
        const toast = document.getElementById("toast");

        toast.textContent = message;
        toast.classList.add("show");

        clearTimeout(toastTimeout);

        toastTimeout = setTimeout(() => {
          toast.classList.remove("show");
        }, 2000);
      }

      function encrypt(text) {
        return btoa(text);
      }

      function decrypt(text) {
        try {
          return atob(text);
        } catch {
          return "";
        }
      }

      function save() {
        const title = document.getElementById("title").value;
        const password = document.getElementById("password").value;
        const url = document.getElementById("url").value;
        const username = document.getElementById("username").value;

        if (!title || !password) return alert("Faltan datos");

        const item = {
          title,
          username, // 👈 nuevo
          password: encrypt(password),
          url,
          date: new Date().toLocaleString(),
        };

        if (editIndex !== null) {
          data[editIndex] = item;
          editIndex = null;
        } else {
          data.push(item);
        }

        localStorage.setItem("passwords", JSON.stringify(data));
        clearForm();
        render();
      }

      function clearForm() {
        title.value = "";
        username.value = ""; // 👈 nuevo
        password.value = "";
        url.value = "";
      }

      function render() {
        const search = document.getElementById("search").value.toLowerCase();
        const list = document.getElementById("list");
        list.innerHTML = "";

        data
          .filter((i) => i.title.toLowerCase().includes(search))
          .forEach((item, index) => {
            const div = document.createElement("div");
            div.className = "card";
            div.draggable = true;
            div.dataset.index = index;

            div.addEventListener("dragstart", handleDragStart);
            div.addEventListener("dragover", handleDragOver);
            div.addEventListener("drop", handleDrop);
            div.addEventListener("dragend", handleDragEnd);

            div.innerHTML = `
  <h3>${item.title}</h3>

  <p class="row">
    <button class="icon-btn btn-user" title="Copiar usuario" onclick="copyUser(${index})">
      <i class="fa fa-user"></i>
    </button>
    <span class="click-copy" title="Copiar usuario" onclick="copyUser(${index})">
      ${item.username || "-"}
    </span>
  </p>

  <p class="row">
    <button class="icon-btn btn-pass" title="Copiar contraseña" onclick="copyPass(${index})">
      <i class="fa fa-copy"></i>
    </button>
    <span id="pass-${index}" class="click-copy" title="Copiar contraseña" onclick="copyPass(${index})">
      ******
    </span>
    <button class="icon-btn btn-view" title="Mostrar / ocultar contraseña" onclick="toggle(${index})">
      <i class="fa fa-eye"></i>
    </button>
  </p>

  <p class="row">
    <button class="icon-btn btn-url" title="Copiar URL" onclick="copyUrl(${index})">
      <i class="fa fa-link"></i>
    </button>
    <a href="${item.url}" target="_blank" class="url click-copy" title="Copiar URL" onclick="copyUrl(${index}); return false;">
      ${item.url}
    </a>
  </p>

  <p class="date">${item.date}</p>

  <div class="actions">
    <button class="btn-edit" title="Editar" onclick="edit(${index})">
      <i class="fa fa-edit"></i>
    </button>
    <button class="btn-delete" title="Eliminar" onclick="removeItem(${index})">
      <i class="fa fa-trash"></i>
    </button>
  </div>
`;

            list.appendChild(div);
          });
      }

      function handleDragStart() {
        dragStartIndex = +this.dataset.index;
        this.style.opacity = "0.5";
      }

      function handleDragOver(e) {
        e.preventDefault();
        this.style.border = "2px dashed #38bdf8";
      }

      function handleDrop() {
        const dragEndIndex = +this.dataset.index;
        reorderData(dragStartIndex, dragEndIndex);
      }

      function handleDragEnd() {
        this.style.opacity = "1";
        this.style.border = "none";
      }

      function reorderData(start, end) {
        const item = data.splice(start, 1)[0];
        data.splice(end, 0, item);

        localStorage.setItem("passwords", JSON.stringify(data));
        render();
      }

      function toggle(index) {
        const el = document.getElementById("pass-" + index);
        el.innerText = el.innerText === "******" ? decrypt(data[index].password) : "******";
      }

      function copyText(value, label = "Dato") {
        if (!value) {
          alert(`No hay ${label.toLowerCase()} para copiar`);
          return;
        }

        navigator.clipboard.writeText(value);

        // feedback visual 🔥
        showToast(`${label} copiado`);
      }

      function copyUser(index) {
        copyText(data[index].username, "Usuario");
      }

      function copyPass(index) {
        copyText(decrypt(data[index].password), "Password");
      }

      function copyUrl(index) {
        copyText(data[index].url, "URL");
      }

      function edit(index) {
        const item = data[index];
        title.value = item.title;
        username.value = item.username || ""; // 👈 nuevo
        password.value = decrypt(item.password);
        url.value = item.url;
        editIndex = index;
      }

      function removeItem(index) {
        if (!confirm("¿Eliminar?")) return;
        data.splice(index, 1);
        localStorage.setItem("passwords", JSON.stringify(data));
        render();
      }

      function generatePassword() {
        const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%";
        let pass = "";
        for (let i = 0; i < 12; i++) {
          pass += chars[Math.floor(Math.random() * chars.length)];
        }
        document.getElementById("password").value = pass;
      }

      function exportData() {
        const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "passwords.json";
        a.click();
      }

      function importData(e) {
        const file = e.target.files[0];
        const reader = new FileReader();

        reader.onload = function () {
          if (!confirm("Esto reemplazará todo. ¿Continuar?")) return;
          data = JSON.parse(reader.result);
          localStorage.setItem("passwords", JSON.stringify(data));
          render();
        };

        reader.readAsText(file);
      }

      function toggleInputPassword() {
        const input = document.getElementById("password");
        const icon = document.getElementById("togglePass");

        if (input.type === "password") {
          input.type = "text";
          icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
          input.type = "password";
          icon.classList.replace("fa-eye-slash", "fa-eye");
        }
      }

      const searchInput = document.getElementById("search");

      searchInput.addEventListener("input", render);

      searchInput.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          searchInput.value = "";
          render();
        }
      });
      render();
    </script>
  </body>
</html>
